<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitación Baby Shower</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ffd6ec,#ffeaf5);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.tarjeta{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.tarjeta img{
max-width:100%;
border-radius:15px;
}

.boton{
margin-top:25px;
padding:15px 35px;
background:#ff69b4;
color:white;
font-size:20px;
border:none;
border-radius:40px;
cursor:pointer;
transition:0.3s;
}

.boton:hover{
background:#ff4fa3;
transform:scale(1.05);
}

</style>

</head>

<body>

<div class="tarjeta">

<img src="Invitacion.png">

<br>

<button class="boton" onclick="abrir()">Abrir Invitación</button>

</div>

<script>

function abrir(){
window.location.href="video.html"
}

</script>

</body>
</html>
